app = "grindspot-fly-app"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    VITE_API_URL = "/api"
    VITE_STRIPE_PUBLIC_KEY = "pk_test_replace_me"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  FRONTEND_DIST_PATH = "/app/frontend-dist"
  AUTO_SEED = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[mounts]
  source = "uploads_data"
  destination = "/app/uploads"
  initial_size = "3gb"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
